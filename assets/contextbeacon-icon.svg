<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title>ContextBeacon icon</title>
  <desc>Dark rounded-square badge with a centered beacon and radiating signal arcs.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="48" x2="440" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07111f" />
      <stop offset="55%" stop-color="#0b1630" />
      <stop offset="100%" stop-color="#111e40" />
    </linearGradient>
    <linearGradient id="ring" x1="120" y1="132" x2="392" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#49d8ff" />
      <stop offset="45%" stop-color="#76f2d1" />
      <stop offset="100%" stop-color="#ffb24d" />
    </linearGradient>
    <linearGradient id="tower" x1="196" y1="170" x2="316" y2="352" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f6fbff" />
      <stop offset="45%" stop-color="#7ef7e5" />
      <stop offset="100%" stop-color="#2bc3ff" />
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="35%" stop-color="#ffe7a3" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#ffe7a3" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.11 0 1 0 0 0.71 0 0 1 0 0.87 0 0 0 0.85 0" result="colored" />
      <feMerge>
        <feMergeNode in="colored" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="innerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 1 0 0 0.72 0 0 1 0 0.3 0 0 0 0.8 0" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  <circle cx="256" cy="256" r="168" fill="none" stroke="url(#ring)" stroke-width="22" opacity="0.9" />
  <circle cx="256" cy="256" r="126" fill="none" stroke="#6ef0ff" stroke-width="2" opacity="0.22" />
  <circle cx="256" cy="256" r="92" fill="none" stroke="#6ef0ff" stroke-width="2" opacity="0.16" />

  <g opacity="0.9">
    <path d="M164 196c34-48 82-72 92-72s58 24 92 72" fill="none" stroke="#50dcff" stroke-width="10" stroke-linecap="round" opacity="0.5" />
    <path d="M146 244c46-66 92-96 110-96s64 30 110 96" fill="none" stroke="#6ef0cc" stroke-width="8" stroke-linecap="round" opacity="0.35" />
    <path d="M136 292c52-76 102-110 120-110s68 34 120 110" fill="none" stroke="#ffbf66" stroke-width="6" stroke-linecap="round" opacity="0.24" />
  </g>

  <g transform="translate(0 4)">
    <rect x="204" y="274" width="104" height="32" rx="16" fill="#0a1228" opacity="0.95" />
    <path d="M220 286h72c8 0 14 6 14 14v6H206v-6c0-8 6-14 14-14z" fill="#132243" />
    <path d="M244 146h24l18 36h-60z" fill="#10203f" />
    <path d="M232 182h48l18 86c2 10-6 20-16 20h-52c-10 0-18-10-16-20z" fill="url(#tower)" />
    <path d="M248 152h16l10 18h-36z" fill="#ffffff" opacity="0.2" />
    <path d="M235 232h42l-8 56h-26z" fill="#0e2041" opacity="0.3" />
    <rect x="224" y="260" width="64" height="18" rx="9" fill="#0a1327" />
    <rect x="231" y="206" width="50" height="22" rx="11" fill="#f6fbff" opacity="0.16" />
    <rect x="240" y="170" width="32" height="20" rx="10" fill="#f6fbff" opacity="0.22" />
    <circle cx="256" cy="144" r="22" fill="url(#glow)" filter="url(#softGlow)" />
    <circle cx="256" cy="144" r="9" fill="#fff3cf" filter="url(#innerGlow)" />
  </g>

  <path d="M186 334c18 20 43 32 70 32s52-12 70-32" fill="none" stroke="#6ef0ff" stroke-width="16" stroke-linecap="round" opacity="0.5" />
  <path d="M160 354c27 30 64 48 96 48s69-18 96-48" fill="none" stroke="#ffb24d" stroke-width="12" stroke-linecap="round" opacity="0.3" />
</svg>
